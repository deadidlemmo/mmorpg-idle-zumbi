services:
  postgres:
    image: postgres:16
    container_name: zumbi_postgres
    restart: always
    environment:
      POSTGRES_USER: zumbi
      POSTGRES_PASSWORD: zumbi123
      POSTGRES_DB: mmorpg_zumbi
    ports:
      - "5433:5432"
    volumes:
      - zumbi_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zumbi_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - zumbi_redis_data:/data

volumes:
  zumbi_postgres_data:
  zumbi_redis_data: